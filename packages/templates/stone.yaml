# Copy this template into packages/<group>/<package>/stone.yaml and replace the
# placeholder values.
#
# The paired PACKAGE.md must explain implementation choice, static-first build
# attempt, musl link model, runtime-clean status, and runtime dependencies before
# the package is accepted as canonical.

name        : PACKAGE_NAME
version     : 0.1.0
release     : 1
summary     : Short package summary
license     : LICENSE_ID
homepage    : https://onix-os.com
upstreams   :
    - SOURCE_URL: SOURCE_SHA256
description : |
    Explain what this ONIX package provides.

    Package policy:

    - Rust-first when a serious Rust implementation exists.
    - musl-only for system binaries.
    - runtime-clean: no runtime /nix/store dependency.
    - static or static-PIE musl output by default.
    - minimal ONIX-owned shared-library surface only when static is not the
      right model.
install     : |
    install -dm00755 %(installroot)/usr
    install -dm00755 %(installroot)/usr/share
    install -dm00755 %(installroot)/usr/share/onix
    install -dm00755 %(installroot)/usr/share/onix/packages

    # Install package files here.
    #
    # Keep payloads /usr-centric. Root-level mutable state belongs in packaged
    # defaults under /usr/share/defaults or in image/boot materialization glue,
    # not directly in the stone payload.

    cat > %(installroot)/usr/share/onix/packages/PACKAGE_NAME.md <<'EOF_PACKAGE_NOTE'
    # PACKAGE_NAME

    This package was accepted through the ONIX Phase 5 package contract.
    EOF_PACKAGE_NOTE

    chmod 0644 %(installroot)/usr/share/onix/packages/PACKAGE_NAME.md

    # Boulder build dirs inherit setgid. Clear it on directories we created so
    # Moss receives ordinary directory layout metadata.
    chmod g-s \
        %(installroot)/usr \
        %(installroot)/usr/share \
        %(installroot)/usr/share/onix \
        %(installroot)/usr/share/onix/packages
