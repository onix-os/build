name        : onix-branding
version     : 0.1.0
release     : 1
summary     : ONIX identity and default login text
license     : MIT
homepage    : https://onix-os.com
description : |
    Identity package for ONIX. It provides os-info metadata used by Moss to
    generate os-release, plus default login text for future ONIX images.
install     : |
    install -dm00755 %(installroot)/usr/lib
    install -dm00755 %(installroot)/usr/share/onix/branding
    install -dm00755 %(installroot)/usr/share/defaults/etc

    cat > %(installroot)/usr/lib/os-info.json <<'EOF_OS_INFO'
    {
      "$schema": "https://raw.githubusercontent.com/AerynOS/os-info/refs/heads/main/schema/0.1/os-info.schema.json",
      "os-info-version": "0.1",
      "start_date": "2026-07-01T00:00:00Z",
      "metadata": {
        "identity": {
          "id": "onix",
          "name": "ONIX",
          "display": "ONIX (atomic musl base + Nix toolbox)",
          "ansi_color": "38;2;79;110;145",
          "former_identities": []
        },
        "maintainers": {
          "core": [
            {
              "name": "ONIX project",
              "role": "founder",
              "email": "https://github.com/onix-os"
            }
          ]
        },
        "version": {
          "full": "rolling",
          "short": "rolling",
          "build_id": "unbuilt",
          "released": "2026-07-05T00:00:00Z"
        }
      },
      "system": {
        "composition": {
          "bases": [],
          "technology": {
            "core": ["moss", "boulder", "nix"],
            "optional": []
          }
        },
        "features": {
          "atomic_updates": {
            "strategy": "transactional",
            "rollback_support": true
          },
          "boot": {
            "bootloader": "systemd-boot",
            "firmware": {
              "uefi": true,
              "secure_boot": false,
              "bios": false
            }
          },
          "filesystem": {
            "default": "xfs",
            "supported": ["xfs", "ext4"]
          }
        },
        "kernel": {
          "type": "monolithic",
          "name": "linux"
        },
        "platform": {
          "architecture": "x86_64",
          "variant": "generic"
        },
        "update": {
          "strategy": "transactional",
          "cadence": {
            "type": "rolling"
          },
          "approach": "full-system"
        }
      },
      "resources": {
        "websites": {
          "homepage": {
            "url": "https://onix-os.com",
            "display_name": "ONIX homepage",
            "scope": "home"
          },
          "source": {
            "url": "https://github.com/onix-os",
            "display_name": "ONIX repositories",
            "scope": "developer"
          }
        },
        "social": {},
        "funding": {}
      }
    }
    EOF_OS_INFO

    cat > %(installroot)/usr/share/defaults/etc/issue <<'EOF_ISSUE'
    ONIX \r (\l)
    EOF_ISSUE

    cat > %(installroot)/usr/share/onix/branding/logo.txt <<'EOF_LOGO'
                  ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
              ▓▓▓  ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
             ▓▓▓▓▓  ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
            ▓▓▓▓▓▓▓  ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒
           ▓▓▓▓▓▓▓▓▓               ▒▒▒▒▒▒▒▒▒▒
          ▓▓▓▓▓▓▓▓▓                  ▒▒▒▒▒▒▒▒▒▒
         ▓▓▓▓▓▓▓▓▓                    ▒▒▒▒▒▒▒▒▒▒
        ▓▓▓▓▓▓▓▓▓                      ▒▒▒▒▒▒▒▒▒▒
       ▓▓▓▓▓▓▓▓▓                        ▒▒▒▒▒▒▒▒▒
      ▓▓▓▓▓▓▓▓▓                          ▒▒▒▒▒▒▒▒▒
     ▓▓▓▓▓▓▓▓▓                            ▒▒▒▒▒▒▒▒▒
     ▓▓▓▓▓▓▓▓▓                            ▒▒▒▒▒▒▒▒▒
      ▓▓▓▓▓▓▓▓▓                          ▒▒▒▒▒▒▒▒▒
       ▓▓▓▓▓▓▓▓▓                        ▒▒▒▒▒▒▒▒▒
        ▓▓▓▓▓▓▓▓▓                      ▒▒▒▒▒▒▒▒▒▒
        ▓▓▓▓▓▓▓▓▓▓                    ▒▒▒▒▒▒▒▒▒▒
          ▓▓▓▓▓▓▓▓▓                  ▒▒▒▒▒▒▒▒▒▒
           ▓▓▓▓▓▓▓▓▓▓               ▒▒▒▒▒▒▒▒▒▒
            ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓  ▒▒▒▒▒▒▒
             ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓  ▒▒▒▒▒
              ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓  ▒▒▒
                ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
    EOF_LOGO

    orange="$(printf '\033[38;2;231;89;15m')"
    blue="$(printf '\033[38;2;79;110;145m')"
    reset="$(printf '\033[0m')"
    sed -E \
        -e "s/(▓+)/${orange}\1${reset}/g" \
        -e "s/(▒+)/${blue}\1${reset}/g" \
        %(installroot)/usr/share/onix/branding/logo.txt \
        > %(installroot)/usr/share/onix/branding/logo.ansi

    cat %(installroot)/usr/share/onix/branding/logo.ansi > %(installroot)/usr/share/defaults/etc/motd
    cat >> %(installroot)/usr/share/defaults/etc/motd <<'EOF_MOTD'

    Welcome to ONIX.

    moss controls the machine. Nix controls the toolbox.
    EOF_MOTD

    chmod 0644 \
        %(installroot)/usr/lib/os-info.json \
        %(installroot)/usr/share/onix/branding/logo.txt \
        %(installroot)/usr/share/onix/branding/logo.ansi \
        %(installroot)/usr/share/defaults/etc/issue \
        %(installroot)/usr/share/defaults/etc/motd

    # Boulder build dirs inherit setgid. If package-created directories keep
    # g+s, Boulder may record special directory layout entries that Moss later
    # rejects. Clear it on every directory we created.
    chmod g-s \
        %(installroot)/usr \
        %(installroot)/usr/lib \
        %(installroot)/usr/share \
        %(installroot)/usr/share/onix \
        %(installroot)/usr/share/onix/branding \
        %(installroot)/usr/share/defaults \
        %(installroot)/usr/share/defaults/etc
