name        : onix-filesystem
version     : 0.1.0
release     : 1
summary     : ONIX filesystem layout policy and default templates
license     : MIT
homepage    : https://onix-os.com
description : |
    Filesystem layout policy for ONIX. This package documents the intended
    machine/user/persistence boundaries and ships default templates under
    /usr/share/defaults/etc for image assembly or boot-time materialization.
install     : |
    install -dm00755 %(installroot)/usr/share/onix
    install -dm00755 %(installroot)/usr/share/defaults/etc/profile.d

    cat > %(installroot)/usr/share/onix/filesystem-layout.md <<'EOF_LAYOUT'
    # ONIX filesystem layout

    ONIX keeps a hard ownership boundary:

    - moss owns /usr, boot artifacts, and the machine plane.
    - Nix owns /nix and user-selected toolbox software.
    - local/admin state lives outside immutable package payloads.

    ## Package payload rule

    ONIX stones are /usr-centric. Packages ship defaults and policy under /usr.
    Image assembly or boot-time glue materializes mutable root-level state.

    ## Important paths

    - /usr — moss-managed, transactional machine payload
    - /.moss — moss content/state store
    - /usr/share/defaults/etc — packaged defaults for future /etc materialization
    - /etc — local machine configuration and compatibility symlinks
    - /persist — persistent system data on installed systems
    - /persist/home -> /home — user data
    - /persist/nix -> /nix — persistent Nix store
    - /run — runtime state, never packaged
    - /dev, /proc, /sys — kernel/runtime filesystems, never packaged

    ## Compatibility links created by image assembly

    - /etc/os-release -> ../usr/lib/os-release
    EOF_LAYOUT

    cat > %(installroot)/usr/share/defaults/etc/fstab <<'EOF_FSTAB'
    # ONIX default fstab template.
    # Image assembly should copy/adapt this into /etc/fstab.

    LABEL=ONIX-ESP      /efi      vfat  rw,relatime,noatime  0 2
    LABEL=ONIX-BOOT     /boot     vfat  rw,relatime,noatime  0 2
    LABEL=onix-root     /         xfs   rw,relatime          0 1
    LABEL=ONIX-PERSIST  /persist  xfs   rw,relatime          0 2

    /persist/home       /home     none  bind                  0 0
    /persist/nix        /nix      none  bind                  0 0
    EOF_FSTAB

    cat > %(installroot)/usr/share/defaults/etc/profile.d/onix-path.sh <<'EOF_PATH'
    # ONIX default PATH policy.
    # This is a default template; image/boot glue may install it into /etc/profile.d.

    case ":${PATH:-}:" in
        *:/usr/bin:*) ;;
        *) PATH="/usr/bin${PATH:+:$PATH}" ;;
    esac

    case ":$PATH:" in
        *:/usr/sbin:*) ;;
        *) PATH="/usr/sbin:$PATH" ;;
    esac

    export PATH
    EOF_PATH

    chmod 0644 \
        %(installroot)/usr/share/onix/filesystem-layout.md \
        %(installroot)/usr/share/defaults/etc/fstab \
        %(installroot)/usr/share/defaults/etc/profile.d/onix-path.sh

    # Boulder build dirs inherit setgid. Clear it on directories we created so
    # Moss receives ordinary directory layout metadata.
    chmod g-s \
        %(installroot)/usr \
        %(installroot)/usr/share \
        %(installroot)/usr/share/onix \
        %(installroot)/usr/share/defaults \
        %(installroot)/usr/share/defaults/etc \
        %(installroot)/usr/share/defaults/etc/profile.d
