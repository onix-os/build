name: book

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: book-pages
  cancel-in-progress: true

jobs:
  deploy_site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v1
        with:
          mdbook-version: 'latest'

      - name: Build mdBook from root book.toml
        run: make book

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          exclude_assets: '.github,.envrc,.gitignore,book.toml,flake.nix,flake.lock,Makefile,**/Makefile,**/*.sh,**/*.yaml,**/*.yaml.in,**/.gitkeep,recipes/**'
          force_orphan: true
